volumes:
  n8n_storage:
  n8n_postgres_storage:
  n8n_ollama_storage:

networks:
  n8n-network:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['n8n-network']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
    - N8N_RUNNERS_ENABLED=true
    - N8N_HOST=localhost
    - N8N_PORT=5678
    - N8N_PROTOCOL=http
    - N8N_CORS_ALLOW_ORIGIN=*
    - WEBHOOK_URL=http://localhost:5678/
    - GENERIC_TIMEZONE=Africa/Dakar
    - TZ=Africa/Dakar
    - OLLAMA_HOST=ollama:11434
    # Autorise le node "Read/Write Files from Disk" à lire ./shared (JSON des chunks).
    # Par défaut n8n ne permet que /home/node/.n8n-files.
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/shared
  env_file:
    - path: .env
      required: true

services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    networks: ['n8n-network']
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - n8n_postgres_storage:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1.5g

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    container_name: ollama
    networks: ['n8n-network']
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - n8n_ollama_storage:/root/.ollama
    environment:
      # Garde les modèles en mémoire indéfiniment (évite les timeouts au rechargement).
      - OLLAMA_KEEP_ALIVE=-1
      # embedding (nomic-embed-text) + génération (llama3.2) coexistent en mémoire.
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        limits:
          memory: 12g

  ollama-pull:
    image: ollama/ollama:latest
    networks: ['n8n-network']
    container_name: ollama-pull
    restart: "no"
    volumes:
      - n8n_ollama_storage:/root/.ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=ollama:11434
    # Attend qu'Ollama réponde, puis tire l'embedding d'abord (petit, prêt vite)
    # puis le modèle de génération.
    command:
      - "-c"
      - "until ollama list >/dev/null 2>&1; do echo 'attente ollama...'; sleep 2; done; ollama pull nomic-embed-text; ollama pull llama3.2"
    depends_on:
      ollama:
        condition: service_started

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2g

  pdf-server:
    image: nginx:alpine
    hostname: pdf-server
    container_name: pdf-server
    networks: ['n8n-network']
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # le PDF (et tout fichier à servir) vit dans ./shared
      - ./shared:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          memory: 128m