server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy des appels API vers le backend FastAPI
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
    }
}
