volumes:
  qdrant_storage:
    name: rag_qdrant_storage
  ollama_storage:
    name: rag_ollama_storage  
  n8n_storage:
    name: rag_n8n_storage
  n8n_pg_storage:
    name: rag_n8n_pg_storage

networks:
  rag-network:
    name: rag-network

# Ancre partagée pour n8n
x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['rag-network']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=n8n-postgres
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
    - N8N_RUNNERS_ENABLED=true
    - N8N_HOST=localhost
    - N8N_PORT=5678
    - N8N_PROTOCOL=http
    - N8N_CORS_ALLOW_ORIGIN=*
    - WEBHOOK_URL=http://localhost:5678/
    - GENERIC_TIMEZONE=Africa/Dakar
    - TZ=Africa/Dakar
    - RAG_API_URL=http://api:8000
  env_file:
    - .env  

services:
  # --- Base vectorielle ---
  qdrant:
    image: qdrant/qdrant:latest
    hostname: qdrant
    container_name: qdrant
    networks: ['rag-network']
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # --- LLM local ---
  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    container_name: ollama
    networks: ['rag-network']
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits:
          memory: 12g

  ollama-pull:
    image: ollama/ollama:latest
    networks: ['rag-network']
    container_name: ollama-pull
    restart: "no"
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=ollama:11434
    command:
      - "-c"
      - "until ollama list >/dev/null 2>&1; do echo 'attente ollama...'; sleep 2; done; ollama pull llama3.2"
    depends_on:
      ollama:
        condition: service_started

  # --- API REST ---
  api:
    build:
      context: ..  # Remonte d'un niveau pour accéder au Dockerfile racine
      dockerfile: Dockerfile
    hostname: api
    container_name: rag-api
    networks: ['rag-network']
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-large-latest}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - PDF_PUBLIC_URL=http://localhost:8080/CODE-DE-LA-FAMILLE.pdf
    volumes:
      - ../data:/code/data
      - ../scripts:/code/scripts
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # --- Serveur PDF ---
  pdf-server:
    image: nginx:alpine
    hostname: pdf-server
    container_name: pdf-server
    networks: ['rag-network']
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../data:/usr/share/nginx/html:ro  

  # --- Frontend React ---
  frontend:
    build:
      context: ../frontend-react  
      dockerfile: Dockerfile
    hostname: frontend
    container_name: rag-frontend
    networks: ['rag-network']
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  # --- Base n8n ---
  n8n-postgres:
    image: postgres:16-alpine
    hostname: n8n-postgres
    container_name: n8n-postgres
    networks: ['rag-network']
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - n8n_pg_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n}']
      interval: 5s
      timeout: 5s
      retries: 10

  # --- n8n ---
  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2g